<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Face Attendance{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#00d2ff">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-user-check"></i>
            <span>FaceAttend</span>
        </div>
        <ul class="nav-links">
            <li><a href="/dashboard" class="{% if request.path == '/' or request.path == '/dashboard' %}active{% endif %}">
                <i class="fas fa-chart-pie"></i><span>Dashboard</span>
            </a></li>
            <li><a href="/register" class="{% if request.path == '/register' %}active{% endif %}">
                <i class="fas fa-user-plus"></i><span>Register</span>
            </a></li>
            <li><a href="/attendance" class="{% if request.path == '/attendance' %}active{% endif %}">
                <i class="fas fa-camera"></i><span>Attendance</span>
            </a></li>
            <li><a href="/students" class="{% if request.path == '/students' %}active{% endif %}">
                <i class="fas fa-users"></i><span>Students</span>
            </a></li>
            <li><a href="/schedules" class="{% if request.path == '/schedules' %}active{% endif %}">
                <i class="fas fa-calendar-alt"></i><span>Schedules</span>
            </a></li>
            <li><a href="/reports" class="{% if request.path == '/reports' %}active{% endif %}">
                <i class="fas fa-file-alt"></i><span>Reports</span>
            </a></li>
            <li class="nav-divider"></li>
            <li><a href="/admin" class="{% if request.path == '/admin' %}active{% endif %}">
                <i class="fas fa-cog"></i><span>Admin</span>
            </a></li>
        </ul>
        <div class="sidebar-footer">
            <div id="user-info" style="font-size:0.78rem;margin-bottom:4px;"></div>
            <a href="#" onclick="logout()" style="color:var(--danger);text-decoration:none;font-size:0.78rem;">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </div>
    </nav>

    <main class="main-content">
        <header class="top-bar">
            <button class="menu-toggle" aria-label="Toggle menu">
                <i class="fas fa-bars"></i>
            </button>
            <h1>{% block page_title %}Dashboard{% endblock %}</h1>
            <div class="top-bar-actions">
                <span class="clock" id="live-clock"></span>
                {% block top_actions %}{% endblock %}
            </div>
        </header>
        <div class="content-area">
            {% block content %}{% endblock %}
        </div>
    </main>

    <div id="toast-container"></div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script src="{{ url_for('static', filename='js/realtime.js') }}"></script>
    {% block scripts %}{% endblock %}

    <script>
    // PWA Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/static/sw.js').catch(() => {});
    }
    </script>
</body>
</html>
