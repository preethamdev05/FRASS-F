name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff mypy
      - run: ruff check app/ tests/
      - run: mypy app/ --ignore-missing-imports --no-error-summary || true

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_attendance
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test_attendance
      REDIS_URL: redis://localhost:6379/1
      FLASK_ENV: testing
      SECRET_KEY: ci-test-secret-key-64-bytes-long-for-testing-purposes-only
      JWT_SECRET_KEY: ci-test-jwt-secret-key-64-bytes-long-for-testing-purposes-only
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0 libpq-dev
      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run unit tests
        run: pytest tests/test_auth.py tests/test_attendance.py tests/test_students.py tests/test_liveness.py tests/test_antispoof.py tests/test_face_engine.py tests/test_fras_core.py tests/test_hardware.py tests/test_models.py tests/test_services.py -v --tb=short --cov=app --cov=fras_core --cov-report=term-missing
      - name: Run integration tests (PostgreSQL)
        run: pytest tests/test_api_integration.py -v --tb=short
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  android:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: edge/android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: android-${{ hashFiles('edge/android/**/*.gradle*', 'edge/android/gradle/wrapper/gradle-wrapper.properties') }}
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fras-android-debug
          path: edge/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t fras:${{ github.sha }} .
      - name: Test Docker image health
        run: |
          docker run -d --name fras-test \
            -e FLASK_ENV=testing \
            -e SECRET_KEY=docker-test-secret \
            -e JWT_SECRET_KEY=docker-test-jwt-secret \
            -p 5000:5000 fras:${{ github.sha }}

          # Wait for container to start (gunicorn + worker init can take 15-20s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/api/health > /dev/null 2>&1; then
              echo "Health check passed after ${i}s"
              curl -s http://localhost:5000/api/health
              docker logs fras-test
              docker stop fras-test
              docker rm fras-test
              exit 0
            fi
            echo "Waiting... (${i}/30)"
            sleep 2
          done

          echo "Health check failed after 60s"
          docker logs fras-test
          docker stop fras-test
          docker rm fras-test
          exit 1
